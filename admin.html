<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>数据管理 · 复旦暑托班考勤</title>
<style>
  :root {
    --primary: #1a6fc4;
    --primary-light: #2080d8;
    --success: #3a7d44;
    --bg: #f4f7fb;
    --card: #ffffff;
    --text: #2c2c2c;
    --text-secondary: #7a7268;
    --border: #dce3ed;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    padding: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    padding: 24px 20px 16px;
    border-radius: 0 0 24px 24px;
    margin: -16px -16px 16px;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 12px;
  }

  .stat-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .stat-box {
    flex: 1;
    background: var(--bg);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 8px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg);
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge.in { background: #e8f5e9; color: var(--success); }
  .badge.out { background: #e3f0fd; color: var(--primary); }

  .btn {
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    color: white;
    transition: transform 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
  .btn-success { background: linear-gradient(135deg, #3a7d44, #48a254); }
  .btn-outline {
    background: var(--card);
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
  }
  .btn-danger {
    background: var(--card);
    color: #c0392b;
    border: 1.5px solid #f0c0b8;
  }

  .json-box {
    width: 100%;
    min-height: 120px;
    max-height: 300px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 11px;
    font-family: "SF Mono", "Consolas", monospace;
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    overflow: auto;
    word-break: break-all;
  }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 12px 22px;
    border-radius: 24px; font-size: 14px; font-weight: 600;
    z-index: 9999; max-width: 90vw; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn {
    from { opacity:0; transform: translateX(-50%) translateY(-10px); }
    to { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  .empty { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }
  .hint { font-size: 11px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 考勤数据管理</h1>
  <div class="sub">复旦暑托班工作人员考勤系统</div>
</div>

<!-- Stats -->
<div class="card">
  <div class="card-title">📊 统计</div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">总记录数</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statCheckin">0</div>
      <div class="stat-label">签到次数</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statCheckout">0</div>
      <div class="stat-label">签退次数</div>
    </div>
  </div>
</div>

<!-- Records Table -->
<div class="card">
  <div class="card-title">📝 打卡记录</div>
  <div id="recordsTable">
    <div class="empty">暂无记录</div>
  </div>
</div>

<!-- Export -->
<div class="card">
  <div class="card-title">📤 数据导出与同步</div>
  <p class="hint">点击下方按钮复制所有记录数据，然后发送给 Jason（通过微信），由 Jason 同步到腾讯文档智能表。</p>
  <button class="btn btn-primary" onclick="copyAllRecords()">📋 复制全部记录 (JSON)</button>
  <button class="btn btn-success" onclick="copyPendingSync()" style="margin-top:8px;">📋 复制待同步数据</button>
  <div style="margin-top:12px;">
    <textarea class="json-box" id="jsonOutput" readonly placeholder="点击上方按钮后，数据会显示在这里..."></textarea>
  </div>
</div>

<!-- Clear -->
<div class="card">
  <div class="card-title">⚠️ 数据管理</div>
  <p class="hint">数据同步完成后，可以清除本设备的记录。此操作不可恢复，请确认数据已备份。</p>
  <button class="btn btn-outline" onclick="clearSynced()">🧹 清除已同步的记录</button>
  <button class="btn btn-danger" onclick="clearAll()">🗑️ 清除全部记录</button>
</div>

<button class="btn btn-outline" onclick="location.href='index.html'" style="margin-bottom:20px;">← 返回打卡页面</button>

<script>
const STORAGE_KEY = 'fudan_attendance_v3';

function getRecords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY + '_records') || '[]');
  } catch(e) { return []; }
}

function getPendingSync() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY + '_pending_sync') || '[]');
  } catch(e) { return []; }
}

function init() {
  const records = getRecords();
  const pending = getPendingSync();

  // Stats
  document.getElementById('statTotal').textContent = records.length;
  document.getElementById('statCheckin').textContent = records.filter(r => r.type === '签到').length;
  document.getElementById('statCheckout').textContent = records.filter(r => r.type === '签退').length;

  // Table
  const container = document.getElementById('recordsTable');
  if (records.length === 0) {
    container.innerHTML = '<div class="empty">暂无记录</div>';
    return;
  }

  // Sort by date/time descending
  records.sort((a, b) => new Date(b.time) - new Date(a.time));

  let html = '<table><thead><tr><th>类型</th><th>姓名</th><th>校区</th><th>日期</th><th>时间</th></tr></thead><tbody>';
  records.forEach(r => {
    const badgeClass = r.type === '签到' ? 'in' : 'out';
    const campus = r.campusName || (r.campus === 'handan' ? '邯郸' : '枫林');
    html += `<tr>
      <td><span class="badge ${badgeClass}">${r.type}</span></td>
      <td>${r.name}</td>
      <td>${campus}</td>
      <td>${r.date || ''}</td>
      <td>${r.timeStr || ''}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function copyAllRecords() {
  const records = getRecords();
  if (records.length === 0) {
    showToast('没有记录可复制');
    return;
  }
  const data = records.map(r => ({
    type: r.type,
    date: r.date,
    campus: r.campusName || (r.campus === 'handan' ? '邯郸校区' : '枫林校区'),
    role: r.role,
    name: r.name,
    time: r.timeStr
  }));
  const json = JSON.stringify(data, null, 2);
  document.getElementById('jsonOutput').value = json;
  copyToClipboard(json);
  showToast(`已复制 ${data.length} 条记录到剪贴板`);
}

function copyPendingSync() {
  const pending = getPendingSync();
  if (pending.length === 0) {
    showToast('没有待同步的数据');
    return;
  }
  const json = JSON.stringify(pending, null, 2);
  document.getElementById('jsonOutput').value = json;
  copyToClipboard(json);
  showToast(`已复制 ${pending.length} 条待同步记录`);
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.getElementById('jsonOutput');
  ta.value = text;
  ta.select();
  document.execCommand('copy');
}

function clearSynced() {
  const pending = getPendingSync();
  if (pending.length === 0) {
    showToast('没有待同步的记录');
    return;
  }
  if (confirm(`确认清除 ${pending.length} 条已同步记录？此操作不可恢复。`)) {
    localStorage.removeItem(STORAGE_KEY + '_pending_sync');
    showToast('已清除待同步记录');
    init();
  }
}

function clearAll() {
  const records = getRecords();
  if (records.length === 0) {
    showToast('没有记录可清除');
    return;
  }
  if (confirm(`⚠️ 确认清除全部 ${records.length} 条记录？\n\n此操作不可恢复！请确保数据已备份。`)) {
    if (confirm(`再次确认：真的要删除全部 ${records.length} 条记录吗？`)) {
      localStorage.removeItem(STORAGE_KEY + '_records');
      localStorage.removeItem(STORAGE_KEY + '_pending_sync');
      localStorage.removeItem(STORAGE_KEY + '_queue');
      showToast('已清除全部记录');
      init();
    }
  }
}

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

init();
</script>
</body>
</html>
