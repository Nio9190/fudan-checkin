<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数据管理 · 复旦暑托班考勤</title>
<style>
  :root {
    --primary: #1a6fc4;
    --primary-light: #2080d8;
    --success: #3a7d44;
    --danger: #c0392b;
    --warn: #c9a94e;
    --bg: #f4f7fb;
    --card: #ffffff;
    --text: #2c2c2c;
    --text-secondary: #7a7268;
    --border: #dce3ed;
    --shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    padding: 16px;
    -webkit-tap-highlight-color: transparent;
  }
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    color: white;
    padding: 24px 20px 16px;
    border-radius: 0 0 24px 24px;
    margin: -16px -16px 16px;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 12px;
  }

  .stat-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .stat-box {
    flex: 1;
    background: var(--bg);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 700; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .toolbar input, .toolbar select {
    flex: 1;
    min-width: 120px;
    height: 40px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
  }
  .btn {
    height: 40px;
    border: none;
    border-radius: 10px;
    padding: 0 16px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    color: white;
    transition: transform 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); }
  .btn-success { background: linear-gradient(135deg, #3a7d44, #48a254); }
  .btn-outline {
    background: var(--card);
    color: var(--text-secondary);
    border: 1.5px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 8px 6px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg);
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge.in { background: #e8f5e9; color: var(--success); }
  .badge.out { background: #e3f0fd; color: var(--primary); }

  .empty { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }
  .hint { font-size: 11px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
  .error { color: var(--danger); font-size: 13px; text-align: center; padding: 12px; }
  .loading { color: var(--text-secondary); text-align: center; padding: 20px; font-size: 13px; }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 12px 22px;
    border-radius: 24px; font-size: 14px; font-weight: 600;
    z-index: 9999; max-width: 90vw; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn {
    from { opacity:0; transform: translateX(-50%) translateY(-10px); }
    to { opacity:1; transform: translateX(-50%) translateY(0); }
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
  }
  .summary-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .summary-item .num { font-size: 18px; font-weight: 700; color: var(--primary); }
  .summary-item .label { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>

<div class="header">
  <h1>📋 考勤数据管理</h1>
  <div class="sub">复旦暑托班工作人员考勤系统 · 后台统计</div>
</div>

<!-- 设置后端地址 -->
<div class="card">
  <div class="card-title">🔧 后端地址</div>
  <div class="toolbar" style="margin-bottom:0;">
    <input type="text" id="apiUrl" placeholder="https://fudan-checkin-backend.xxx.workers.dev" style="flex:3;">
    <button class="btn btn-primary" onclick="loadData()">刷新数据</button>
  </div>
  <p class="hint">把 Cloudflare Worker 的 URL 填在这里，点击"刷新数据"即可查看后台统计。</p>
</div>

<!-- Stats -->
<div class="card">
  <div class="card-title">📊 实时统计</div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">总记录</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statCheckin">0</div>
      <div class="stat-label">签到</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="statCheckout">0</div>
      <div class="stat-label">签退</div>
    </div>
  </div>
  <div class="summary-grid" id="summaryGrid"></div>
</div>

<!-- Records Table -->
<div class="card">
  <div class="card-title">📝 打卡记录</div>
  <div class="toolbar">
    <input type="date" id="filterDate" onchange="renderTable()">
    <select id="filterCampus" onchange="renderTable()">
      <option value="">全部校区</option>
      <option value="handan">邯郸校区</option>
      <option value="fenglin">枫林校区</option>
      <option value="邯郸校区">邯郸校区</option>
      <option value="枫林校区">枫林校区</option>
    </select>
    <select id="filterType" onchange="renderTable()">
      <option value="">全部类型</option>
      <option value="签到">签到</option>
      <option value="签退">签退</option>
    </select>
    <button class="btn btn-success" onclick="exportCSV()">导出 CSV</button>
  </div>
  <div id="recordsTable">
    <div class="loading">点击"刷新数据"加载后台记录</div>
  </div>
</div>

<button class="btn btn-outline" onclick="location.href='index.html'" style="margin-bottom:20px;width:100%;">← 返回打卡页面</button>

<script>
// ============================================================
// CONFIG —— 把 Worker URL 填在这里
// ============================================================
// 默认值会被自动保存到 localStorage，下次打开不用重新填

let allRecords = [];
let stats = {};

function getApiUrl() {
  const input = document.getElementById('apiUrl').value.trim();
  if (input) {
    localStorage.setItem('fudan_checkin_api_url', input);
    return input.replace(/\/$/, '');
  }
  const saved = localStorage.getItem('fudan_checkin_api_url');
  if (saved) return saved.replace(/\/$/, '');
  return '';
}

function initApiUrl() {
  const saved = localStorage.getItem('fudan_checkin_api_url');
  if (saved) document.getElementById('apiUrl').value = saved;
}

async function loadData() {
  const apiUrl = getApiUrl();
  if (!apiUrl) {
    showToast('请先填写后端地址');
    return;
  }

  document.getElementById('recordsTable').innerHTML = '<div class="loading">正在加载...</div>';

  try {
    // 获取统计数据
    const statsResp = await fetch(apiUrl + '/api/stats');
    stats = await statsResp.json();

    // 获取记录列表
    const recordsResp = await fetch(apiUrl + '/api/records');
    const data = await recordsResp.json();
    allRecords = data.records || [];

    renderStats();
    renderTable();
    showToast(`已加载 ${allRecords.length} 条记录`);
  } catch (err) {
    document.getElementById('recordsTable').innerHTML = `<div class="error">加载失败：${err.message}<br>请检查后端地址是否正确</div>`;
    showToast('加载失败，请检查后端地址');
  }
}

function renderStats() {
  if (!stats.ok) return;

  document.getElementById('statTotal').textContent = stats.total || 0;
  document.getElementById('statCheckin').textContent = stats.checkin || 0;
  document.getElementById('statCheckout').textContent = stats.checkout || 0;

  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = '';

  // 按日期统计
  Object.entries(stats.byDate || {}).forEach(([date, s]) => {
    grid.innerHTML += `
      <div class="summary-item">
        <div class="num">${s.total}</div>
        <div class="label">${date}<br>签${s.checkin}/退${s.checkout}</div>
      </div>
    `;
  });

  // 按校区统计
  Object.entries(stats.byCampus || {}).forEach(([campus, s]) => {
    grid.innerHTML += `
      <div class="summary-item">
        <div class="num">${s.total}</div>
        <div class="label">${campus}<br>签${s.checkin}/退${s.checkout}</div>
      </div>
    `;
  });
}

function renderTable() {
  const container = document.getElementById('recordsTable');

  const dateFilter = document.getElementById('filterDate').value;
  const campusFilter = document.getElementById('filterCampus').value;
  const typeFilter = document.getElementById('filterType').value;

  let filtered = allRecords;
  if (dateFilter) {
    filtered = filtered.filter(r => (r.date || r._serverReceivedAt?.slice(0, 10)) === dateFilter);
  }
  if (campusFilter) {
    filtered = filtered.filter(r => (r.campusName || r.campus) === campusFilter || r.campus === campusFilter);
  }
  if (typeFilter) {
    filtered = filtered.filter(r => r.type === typeFilter);
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">暂无记录</div>';
    return;
  }

  let html = '<table><thead><tr><th>类型</th><th>姓名</th><th>岗位</th><th>校区</th><th>日期</th><th>时间</th></tr></thead><tbody>';
  filtered.forEach(r => {
    const badgeClass = r.type === '签到' ? 'in' : 'out';
    const campus = r.campusName || (r.campus === 'handan' ? '邯郸校区' : r.campus === 'fenglin' ? '枫林校区' : r.campus);
    html += `<tr>
      <td><span class="badge ${badgeClass}">${r.type}</span></td>
      <td>${r.name}</td>
      <td>${r.role || ''}</td>
      <td>${campus}</td>
      <td>${r.date || r._serverReceivedAt?.slice(0, 10) || ''}</td>
      <td>${r.timeStr || r.time?.slice(11, 16) || ''}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function exportCSV() {
  if (allRecords.length === 0) {
    showToast('没有数据可导出');
    return;
  }

  const dateFilter = document.getElementById('filterDate').value;
  const campusFilter = document.getElementById('filterCampus').value;
  const typeFilter = document.getElementById('filterType').value;

  let filtered = allRecords;
  if (dateFilter) filtered = filtered.filter(r => (r.date || r._serverReceivedAt?.slice(0, 10)) === dateFilter);
  if (campusFilter) filtered = filtered.filter(r => (r.campusName || r.campus) === campusFilter || r.campus === campusFilter);
  if (typeFilter) filtered = filtered.filter(r => r.type === typeFilter);

  let csv = '\uFEFF类型,日期,时间,校区,岗位,姓名,纬度,经度,精度(米),距离(米)\n';
  filtered.forEach(r => {
    const campus = r.campusName || (r.campus === 'handan' ? '邯郸校区' : r.campus === 'fenglin' ? '枫林校区' : r.campus);
    const date = r.date || r._serverReceivedAt?.slice(0, 10) || '';
    const time = r.timeStr || r.time?.slice(11, 16) || '';
    csv += `${r.type},${date},${time},${campus},${r.role || ''},${r.name},${r.lat || ''},${r.lng || ''},${r.accuracy || ''},${r.distance || ''}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `暑托班考勤_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  showToast(`已导出 ${filtered.length} 条记录`);
}

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

initApiUrl();
</script>
</body>
</html>
